version: 2

models:
  - name: int_retail_deduplicated
    description: |
      Deduplicated retail transactions table. Removes duplicate invoice_no + stock_code combinations,
      keeping only the most recent record based on invoice_date for each combination.
    config:
      materialized: table
    columns:
      - name: invoice_no
        description: Invoice number (trimmed). Transaction identifier.


      - name: stock_code
        description: Product stock code (trimmed).
        data_tests:
          - not_null

      - name: quantity
        description: Quantity of product sold per transaction.
        data_tests:
          - not_null

      - name: unit_price
        description: Unit price of product in local currency.
        data_tests:
          - not_null

      - name: invoice_date
        description: Transaction date and time.
        data_tests:
          - not_null

      - name: customer_id
        description: Customer identifier (trimmed). May be blank for some transactions.
    
      - name: country
        description: Customer's country of residence.
        data_tests:
          - not_null

      - name: country_invalid
        description: Flag for invalid country values.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]

      - name: rn
        description: |
          Row number used for deduplication. Always equals 1 in this final output.
        data_tests:
          - not_null
          - accepted_values:
              values: [1]

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - invoice_no
            - stock_code
          config:
            severity: warn